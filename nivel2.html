<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel 2</title>
  <link rel="stylesheet" href="nivel2.css">
</head>

<body>


<audio id="musica" loop>
  <source src="Traversing the White Peaks.mp3" type="audio/mpeg">
</audio>


<button id="btnRegresar" class="btn-regresar" style="display:none;">
  Regresar
</button>


<div id="pantallaFinal">Nivel Completado</div>


<div class="character-container">
  <img src="personajeprincipal.png" alt="Personaje 2D">
  
  <div class="message" id="message" onclick="advanceMessage()">
    Haz clic aquí para iniciar
  </div>
</div>


<button id="playButton" class="play-button" onclick="iniciarJuego()" style="display:none;">
  Jugar
</button>


<div id="puzzle" style="display:none;">
  
  
<div id="zona1" class="zona" data-pieza="pieza1"></div>
<div id="zona2" class="zona" data-pieza="pieza2"></div>
<div id="zona3" class="zona" data-pieza="pieza3"></div>
<div id="zona4" class="zona" data-pieza="pieza4"></div>
<div id="zona5" class="zona" data-pieza="pieza5"></div>
<div id="zona6" class="zona" data-pieza="pieza6"></div>
<div id="zona7" class="zona" data-pieza="pieza7"></div>
<div id="zona8" class="zona" data-pieza="pieza8"></div> 
<div id="zona9" class="zona" data-pieza="pieza9"></div>



  <div class="pieza" id="pieza1" data-pieza="pieza1" data-word-top="mis" data-word-middle="CONFIANZA" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza1.png" alt="pieza 1"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza2" data-pieza="pieza2" data-word-top="principios" data-word-middle="RESPONSABILIDAD" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza2.png" alt="pieza 2"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza3" data-pieza="pieza3" data-word-top="son" data-word-middle="EMPATÍA" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza3.png" alt="pieza 3"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza4" data-pieza="pieza4"  data-word-middle="y"  draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza4.png" alt="pieza 4"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza5" data-pieza="pieza5"  data-word-middle="mis"  draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza5.png" alt="pieza 5"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza6" data-pieza="pieza6"  data-word-middle="valores" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza6.png" alt="pieza 6"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza7" data-pieza="pieza7" data-word-top="son" data-word-middle="COOPERACIÓN" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza7.png" alt="pieza 7"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza8" data-pieza="pieza8" data-word-top="los" data-word-middle="ORDEN" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza8.png" alt="pieza 8"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
  <div class="pieza" id="pieza9" data-pieza="pieza9" data-word-top="siguientes" data-word-middle="SABIDURÍA" draggable="true">
    <div class="pieza-inner">
      <div class="pieza-front"><img src="pieza9.png" alt="pieza 9"></div>
      <div class="pieza-back">
        <span class="word-top"></span>
        <span class="word-middle"></span>
      </div>
    </div>
  </div>
</div>

<script src="mensajenivel2.js"></script>

</body>
</html>
