<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nivel 5 - Estrategias</title>
<link rel="stylesheet" href="nivel5.css">

</head>
<body>

<div class="game">


<div class="map" id="map">

<div class="darkness" id="darkness"></div>


<div class="player" id="player"></div>


<div class="ghost red" id="g1" style="top:80px;left:1100px;"></div>

<div class="ghost pink" id="g2" style="top:700px;left:100px;"></div>

<div class="ghost blue" id="g3" style="top:700px;left:1100px;"></div>

<div class="ghost orange" id="g4" style="top:350px;left:900px;"></div>

<div class="door" id="door">🚪</div>


<div class="wall" style="top:0;left:0;width:100%;height:25px"></div>
<div class="wall" style="bottom:0;left:0;width:100%;height:25px"></div>
<div class="wall" style="top:0;left:0;width:25px;height:100%"></div>
<div class="wall" style="top:0;right:0;width:25px;height:100%"></div>



<div class="wall" style="top:120px;left:250px;width:350px;height:25px"></div>

<div class="wall" style="top:120px;left:250px;width:25px;height:220px"></div>

<div class="wall" style="top:320px;left:250px;width:250px;height:25px"></div>

<div class="wall" style="top:220px;left:650px;width:25px;height:250px"></div>

<div class="wall" style="top:220px;left:650px;width:300px;height:25px"></div>

<div class="wall" style="top:500px;left:450px;width:350px;height:25px"></div>

<div class="wall" style="top:500px;left:450px;width:25px;height:200px"></div>

<div class="wall" style="top:650px;left:850px;width:25px;height:180px"></div>

<div class="wall" style="top:650px;left:850px;width:250px;height:25px"></div>

<div class="wall" style="top:300px;left:950px;width:25px;height:250px"></div>

<div class="wall" style="top:300px;left:950px;width:180px;height:25px"></div>

<div class="wall" style="top:150px;left:1050px;width:25px;height:180px"></div>

<div class="wall" style="top:720px;left:250px;width:300px;height:25px"></div>

<div class="wall" style="top:720px;left:250px;width:25px;height:120px"></div>


<div class="barText">PROCRASTINACIÓN</div>

<div class="barContainer">
<div class="bar" id="bar"></div>
</div>


<div class="message" id="message"></div>

</div>


<div class="panel">

<h1>PROYECTO DE VIDA</h1>

<div class="box">
<h2>PUNTOS</h2>
<p id="points">0</p>
</div>

<div class="box">
<h2>OBJETIVO</h2>
<p>Recoge buenas estrategias para alcanzar tus metas.</p>
</div>

<div class="box">
<h2>PROCRASTINACIÓN</h2>
<p id="hits">0 / 4</p>
</div>

</div>

</div>

<script src="mensajenivel5.js" defer></script>

</body>
</html>
